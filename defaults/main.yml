---

# These are the defaults for the destination hosts
pki_cert_dist_dir: /etc/myssl
pki_cert_dist_cert: myssl.crt
pki_cert_dist_chain: myssl.chain.crt
pki_cert_dist_fullchain: myssl.fullchain.crt
pki_cert_dist_privkey: myssl.key
pki_cert_dist_group: certs

# These are not defined in order to force declaration at a project level, but are
# here for reference. They determine the source host and location and names of the files.

